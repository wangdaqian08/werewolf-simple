# SPA-serving Nginx config used inside the frontend container.
# Host Nginx proxies 127.0.0.1:8081 here; /api and /ws are routed by the host
# (not this container), so this config only needs to serve static assets.

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hash-named bundles — cache hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Vue Router history mode — always fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # gzip on text-ish assets; brotli is handled by the outer Nginx if enabled.
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;
}
