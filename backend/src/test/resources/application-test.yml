spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  flyway:
    enabled: false

logging:
  level:
    org.hibernate.SQL: WARN
    org.hibernate.exception: WARN
    org.springframework.orm.jpa: WARN
    org.springframework.transaction: WARN

app:
  jwt:
    secret: test-secret-key-for-testing-must-be-32-chars-ok
    expiration-hours: 1

# Shrink every night-phase delay so integration tests that traverse the real
# coroutine finish in seconds rather than minutes. Relative ordering between
# delays is preserved (gap > warmup > cooldown) so the tests that assert
# sequential non-overlapping audio playback remain meaningful.
werewolf:
  timing:
    dead-role-delay-ms: 500
    audio-warmup-ms: 50
    audio-cooldown-ms: 100
    inter-role-gap-ms: 300
    night-init-audio-delay-ms: 500
    waiting-delay-ms: 200
