spring:
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    clean-disabled: true
  # Stub OAuth2 client IDs so Spring Boot auto-config doesn't fail.
  # Real credentials are not needed locally — use POST /api/auth/dev instead.
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: dev-placeholder
            client-secret: dev-placeholder

websocket:
  allowed-origins: "*"

app:
  cors:
    allowed-origins: "http://localhost:5173,http://localhost:3000"

logging:
  level:
    com.werewolf: DEBUG
