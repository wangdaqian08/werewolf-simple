spring:
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    clean-disabled: true
  # Stub OAuth2 client IDs so Spring Boot auto-config doesn't fail.
  # Real credentials are not needed locally — use POST /api/auth/dev instead.
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: dev-placeholder
            client-secret: dev-placeholder

websocket:
  allowed-origins: "*"

app:
  # Dev-only defaults. Base application.yml intentionally has no defaults for these —
  # prod must supply real values via env or it will fail-fast at startup.
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-in-production-must-be-32-chars-min}
  oauth:
    google:
      redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:5173/auth/callback/google}
  cors:
    # Wildcard pattern keeps mobile-on-LAN dev simple (e.g. http://192.168.x.y:5173).
    # Safe here because SecurityConfig sets allowCredentials=false; no cookies/session
    # cross the boundary, only Authorization-header JWT. Prod uses ${FRONTEND_ORIGIN}.
    allowed-origins: "*"

logging:
  level:
    com.werewolf: DEBUG
