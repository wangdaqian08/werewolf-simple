spring:
  application:
    name: werewolf
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${POSTGRES_DB:werewolf}
    username: ${POSTGRES_USER:werewolf}
    password: ${POSTGRES_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: openid,profile,email

app:
  jwt:
    # No default — MUST be provided via env. Dev/e2e profiles supply their own.
    # Fail-fast on missing secret prevents accidental use of a hardcoded key in prod.
    secret: ${JWT_SECRET}
    expiration-hours: 24
  oauth:
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
      token-uri: https://oauth2.googleapis.com/token
      userinfo-uri: https://www.googleapis.com/oauth2/v3/userinfo
      # No localhost default — prod must set this explicitly. Dev profile supplies a localhost default.
      redirect-uri: ${GOOGLE_REDIRECT_URI}
    wechat:
      app-id: ${WECHAT_APP_ID:}
      app-secret: ${WECHAT_APP_SECRET:}
  cors:
    allowed-origins: "*"

server:
  port: 8080

# WebSocket configuration
websocket:
  allowed-origins: "*"
