spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:5432}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 10000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: true
    baseline-on-migrate: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid,profile,email

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-hours: 24
  oauth:
    google:
      client-id: ${GOOGLE_CLIENT_ID}
      client-secret: ${GOOGLE_CLIENT_SECRET}
      token-uri: https://oauth2.googleapis.com/token
      userinfo-uri: https://www.googleapis.com/oauth2/v3/userinfo
      redirect-uri: ${GOOGLE_REDIRECT_URI}
    wechat:
      app-id: ${WECHAT_APP_ID:}
      app-secret: ${WECHAT_APP_SECRET:}

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: native
  tomcat:
    remoteip:
      protocol-header: x-forwarded-proto
      remote-ip-header: x-forwarded-for
  error:
    include-stacktrace: never
    include-message: never

websocket:
  allowed-origins: ${FRONTEND_ORIGIN}

logging:
  level:
    root: INFO
    com.werewolf: INFO
    org.hibernate: WARN
    org.hibernate.SQL: WARN
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.apache.tomcat: WARN
    org.apache.catalina: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE:/var/log/werewolf/backend.log}
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 14
      total-size-cap: 200MB
