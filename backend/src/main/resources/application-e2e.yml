spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration
  datasource:
    url: jdbc:h2:mem:e2edb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  flyway:
    enabled: false

app:
  jwt:
    secret: e2e-secret-key-for-testing-must-be-32-chars-ok
    expiration-hours: 1
  oauth:
    google:
      # OAuth2 auto-config is excluded above; this default exists only so base
      # application.yml's ${GOOGLE_REDIRECT_URI} placeholder resolves during e2e.
      redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:5173/auth/callback/google}
  cors:
    allowed-origins: "*"

websocket:
  allowed-origins: "*"

# Shrunk night-phase timings so real-backend Playwright runs finish in minutes
# instead of tens of minutes. Relative ordering (gap > cooldown > warmup) and
# the non-zero values are preserved so sequential / non-overlapping audio still
# holds. Prod `application.yml` has no werewolf.timing block → uses the
# RoleDelayConfig / NightOrchestrator compile-time defaults.
werewolf:
  timing:
    dead-role-delay-ms: 500
    audio-warmup-ms: 100
    audio-cooldown-ms: 200
    inter-role-gap-ms: 500
    night-init-audio-delay-ms: 1000
    waiting-delay-ms: 500
