# Sample host Nginx site config for werewolf-simple.
#
# Architecture: host Nginx terminates TLS and proxies to the docker-compose
# stack (backend :8080, frontend :8081 — both bound to 127.0.0.1).
#
# Install:
#   sudo cp deploy/nginx-site.conf /etc/nginx/sites-available/werewolf
#   sudo ln -sf /etc/nginx/sites-available/werewolf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS (Let's Encrypt):
#   sudo apt install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d werewolf.example.com
# certbot will rewrite this file to add the 443 server block + redirect.
# Mobile Safari blocks ws:// so HTTPS (and wss://) is REQUIRED in production.

server {
    listen 80;
    server_name werewolf.example.com;

    # Reasonable limits for a hobby deployment.
    client_max_body_size 2m;

    # Extra logging for the deploy runbook; remove once stable.
    access_log /var/log/nginx/werewolf.access.log;
    error_log  /var/log/nginx/werewolf.error.log;

    # --- REST API → backend container ------------------------------------
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- WebSocket (STOMP over SockJS) → backend container ---------------
    # Matches both /ws and /ws/ prefixed paths used by SockJS fallback.
    location /ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Long-lived connections — avoid premature timeouts.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # --- Static audio served by the backend (optional) -------------------
    location /audio/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Vue SPA → frontend container ------------------------------------
    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
