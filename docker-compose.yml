# Werewolf — production docker-compose stack.
#
# All services bind to 127.0.0.1 only; the host Nginx (terminating TLS) is
# responsible for exposing the app to the public internet. See
# deploy/nginx-site.conf for the matching reverse-proxy config.
#
# Usage:
#   cp .env.prod.example .env.prod
#   # edit .env.prod and fill in real secrets
#   docker compose --env-file .env.prod up -d --build
#
# The --env-file flag is required: compose only auto-loads ".env", not ".env.prod".

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: "5432"
    env_file:
      - .env.prod
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    # Host Nginx proxies to this port; /api and /ws are handled by the host,
    # so the frontend container only needs to serve static assets.
    ports:
      - "127.0.0.1:8081:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
