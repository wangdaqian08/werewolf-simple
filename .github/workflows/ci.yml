name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ── Backend ───────────────────────────────────────────────────────────────────
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: werewolf_test
          POSTGRES_USER: werewolf
          POSTGRES_PASSWORD: werewolf
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Run DB init script (mirrors docker/init.sql)
        run: psql -h localhost -U werewolf -d werewolf_test -f docker/init.sql
        env:
          PGPASSWORD: werewolf

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('backend/**/*.gradle.kts', 'backend/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build & test
        run: ./gradlew build
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/werewolf_test
          SPRING_DATASOURCE_USERNAME: werewolf
          SPRING_DATASOURCE_PASSWORD: werewolf

  # ── Frontend ──────────────────────────────────────────────────────────────────
  checks:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Format check (Prettier)
        run: npm run format:check

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type-check
        run: npx vue-tsc -b --noEmit

      - name: Unit tests with coverage
        run: npm run test:unit:coverage

  e2e-ui:
    name: E2E · UI (${{ matrix.shard }}/3)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS dependencies (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: E2E tests (shard ${{ matrix.shard }}/3)
        run: npm run test:e2e:ui -- --shard=${{ matrix.shard }}/3

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shard }}
          path: frontend/blob-report/
          retention-days: 1

  merge-reports:
    name: Merge E2E Reports
    if: always()
    needs: e2e-ui
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download blob reports
        uses: actions/download-artifact@v4
        with:
          pattern: blob-report-*
          path: frontend/blob-report
          merge-multiple: true

      - name: Merge reports
        run: npx playwright merge-reports --reporter html ./blob-report

      - name: Upload merged HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # ── E2E Integration (real backend) ──────────────────────────────────────────
  #
  # Shard map is hand-curated by measured spec runtime, not Playwright's
  # default --shard=N/M (which alphabetically partitions and produced
  # 14m/4m/7m wall-clock — flow-12p-sheriff alone took ~343s on shard 1).
  # Re-balance whenever a new spec lands or runtime drifts ≥30%.
  #
  #   Last measurement (run 25315290671, commit 5a4a760, 2026-05-04):
  #     flow-12p-sheriff.spec.ts        ~343s  (2 12p tests, biggest single)
  #     revote-flow.spec.ts              ~98s
  #     dead-role-audio.spec.ts          ~74s
  #     idiot-flow.spec.ts               ~70s
  #     full-game-audio.spec.ts          ~42s
  #     game-flow.spec.ts (10 seq)      ~145s  (after split, was 13)
  #     game-flow-d1-outcomes.spec.ts    ~80s  (split-out)
  #     sheriff-flow.spec.ts            ~100s  (mostly setupGame; tests quick)
  #     werewolf-win.spec.ts             ~91s
  #     bgm-flow.spec.ts                 ~40s
  #     audio-reconnect-recovery.spec.ts ~45s
  #     witch-audio.spec.ts              ~80s
  #     login.spec.ts                    ~10s
  #     guard-audio-sequence.spec.ts      ~0s  (skipped)
  e2e-integration:
    name: E2E · Integration (${{ matrix.shard.id }}/5)
    runs-on: ubuntu-latest
    needs: backend
    strategy:
      fail-fast: false
      matrix:
        shard:
          - id: 1
            specs: e2e/real/flow-12p-sheriff.spec.ts
          - id: 2
            specs: e2e/real/game-flow.spec.ts e2e/real/sheriff-flow.spec.ts
          - id: 3
            specs: e2e/real/revote-flow.spec.ts e2e/real/idiot-flow.spec.ts e2e/real/game-flow-d1-outcomes.spec.ts
          - id: 4
            specs: e2e/real/dead-role-audio.spec.ts e2e/real/werewolf-win.spec.ts e2e/real/full-game-audio.spec.ts
          - id: 5
            specs: e2e/real/bgm-flow.spec.ts e2e/real/witch-audio.spec.ts e2e/real/audio-reconnect-recovery.spec.ts e2e/real/login.spec.ts e2e/real/guard-audio-sequence.spec.ts

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('backend/**/*.gradle.kts', 'backend/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Install Playwright OS dependencies (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
        working-directory: frontend

      - name: E2E integration tests (shard ${{ matrix.shard.id }}/5)
        run: npx playwright test --config=playwright.real.config.ts ${{ matrix.shard.specs }}
        working-directory: frontend

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-integration-${{ matrix.shard.id }}
          path: frontend/blob-report/
          retention-days: 1

      - name: Upload HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-integration-${{ matrix.shard.id }}
          path: frontend/playwright-report/
          retention-days: 7

  merge-reports-integration:
    name: Merge Integration E2E Reports
    if: always()
    needs: e2e-integration
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download blob reports
        uses: actions/download-artifact@v4
        with:
          pattern: blob-report-integration-*
          path: frontend/blob-report
          merge-multiple: true

      - name: Merge reports
        run: npx playwright merge-reports --reporter html ./blob-report

      - name: Upload merged HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-integration-merged
          path: frontend/playwright-report/
          retention-days: 7
